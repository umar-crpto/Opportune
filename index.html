<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportune Live</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
header{padding:15px;text-align:center;background:#111827;font-size:22px;font-weight:bold;}
input{width:90%;padding:10px;margin:10px;border-radius:10px;border:none;}
.card{background:#1e293b;margin:10px;padding:10px;border-radius:10px;}
button{padding:6px;border:none;border-radius:6px;background:#22c55e;}
</style>
</head>

<body>

<header>Opportune 🌍 (Live Jobs)</header>

<input id="search" placeholder="Search jobs..." onkeyup="render()">

<div id="content">Loading real jobs...</div>

<script>

let jobs=[];
let saved=JSON.parse(localStorage.getItem("saved"))||[];

/* FETCH REAL JOBS */
fetch("https://remotive.com/api/remote-jobs")
.then(res=>res.json())
.then(data=>{
jobs=data.jobs.slice(0,50); // limit for speed
render();
})
.catch(()=>{
content.innerHTML="⚠️ Failed to load jobs. Check internet.";
});

/* SAVE */
function saveJob(job){
if(!saved.find(s=>s.id===job.id)){
saved.push(job);
localStorage.setItem("saved",JSON.stringify(saved));
alert("Saved!");
}
}

/* RENDER */
function render(){
let q=search.value.toLowerCase();
content.innerHTML="";

jobs.filter(j=>j.title.toLowerCase().includes(q)).forEach(j=>{
content.innerHTML+=`
<div class="card">
<b>${j.title}</b>
<p>${j.company_name}</p>
<button onclick='saveJob(${JSON.stringify(j)})'>Save</button>
</div>
`;
});
}

</script>

</body>
</html>
