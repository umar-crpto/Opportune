<!DOCTYPE html>
<html>
<head>
<title>Opportune</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* Header */
h1{
  text-align:center;
  padding:10px;
}

/* Search */
#search{
  width:90%;
  margin:10px;
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

/* Cards */
.card{
  background:#1e293b;
  padding:15px;
  margin:10px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.clickable{
  cursor:pointer;
  transition:0.2s;
}

.clickable:active{
  transform:scale(0.97);
}

/* Star */
.star{
  float:right;
  cursor:pointer;
}

/* Back */
#backBtn{
  display:none;
  margin:10px;
  padding:10px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>🚀 Opportune</h1>

<input id="search" placeholder="Search opportunities..." onkeyup="search()">

<button id="backBtn" onclick="goHome()">⬅ Back</button>

<div id="content"></div>

<script>

// DATA
const data = {
jobs: ["Shop assistant","Delivery job","Office assistant","Freelance writing","Retail worker"],

hustles: ["Sell snacks","Phone charging","Poster design","Resell clothes","Car washing"],

scholarships: ["Government scholarship","Study abroad","Free courses","NGO support","Online certificates"],

business: ["Food business","Laundry service","Mobile money","Printing","Salon business"],

skills: ["Learn coding","Graphic design","Video editing","Public speaking","Marketing"],

online: ["Fiverr gigs","Upwork jobs","Typing online","Selling on Jumia","Affiliate marketing"],

digital: ["Social media management","Content creation","YouTube automation","Blogging","SEO"],

competitions: ["Essay competitions","Tech contests","Startup competitions","Hackathons","School contests"],

ideas: ["Start YouTube channel","Sell ebooks","Create app","Dropshipping","Online tutoring"],

learning: ["Free YouTube courses","Google certificates","Coursera","Khan Academy","Skillshare"]
};

let currentList = [];
let saved = [];

// HOME
function showHome(){
  document.getElementById("backBtn").style.display="none";
  document.getElementById("search").value="";

  document.getElementById("content").innerHTML = `
    <div class="card clickable" onclick="openList(data.jobs)">💼 Jobs</div>
    <div class="card clickable" onclick="openList(data.hustles)">💰 Side Hustles</div>
    <div class="card clickable" onclick="openList(data.scholarships)">🎓 Scholarships</div>
    <div class="card clickable" onclick="openList(data.business)">🚀 Business</div>
    <div class="card clickable" onclick="openList(data.skills)">🧠 Skills</div>
    <div class="card clickable" onclick="openList(data.online)">🌐 Online Work</div>
    <div class="card clickable" onclick="openList(data.digital)">📱 Digital Skills</div>
    <div class="card clickable" onclick="openList(data.competitions)">🏆 Competitions</div>
    <div class="card clickable" onclick="openList(data.ideas)">💡 Ideas</div>
    <div class="card clickable" onclick="openList(data.learning)">📚 Free Learning</div>
    <div class="card clickable" onclick="showSaved()">⭐ Saved</div>
  `;
}

// OPEN LIST
function openList(list){
  document.getElementById("backBtn").style.display="block";
  currentList = list;
  display(list);
}

// DISPLAY
function display(list){
  if(list.length===0){
    document.getElementById("content").innerHTML="<div class='card'>No results</div>";
    return;
  }

  document.getElementById("content").innerHTML = list.map(item => `
    <div class="card">
      ${item}
      <span class="star" onclick="saveItem('${item}', event)">⭐</span>
    </div>
  `).join("");
}

// SAVE
function saveItem(item,event){
  event.stopPropagation();
  if(!saved.includes(item)){
    saved.push(item);
    alert("Saved!");
  }
}

// SEARCH
function search(){
  let input=document.getElementById("search").value.toLowerCase();

  let results=currentList.filter(item =>
    item.toLowerCase().includes(input)
  );

  display(results);
}

// SAVED
function showSaved(){
  document.getElementById("backBtn").style.display="block";
  currentList=saved;
  display(saved.length?saved:["No saved items"]);
}

// BACK
function goHome(){
  showHome();
}

// START
showHome();

</script>

</body>
</html>
