<!DOCTYPE html>
<html>
<head>
  <title>Opportune</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f2f4f8;
    }

    .header {
      background: #1e90ff;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .search {
      padding: 10px;
    }

    input {
      width: 95%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .feed {
      padding: 10px;
    }

    .card {
      background: white;
      margin-bottom: 10px;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .tag {
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 5px;
      color: white;
      display: inline-block;
      margin-bottom: 5px;
    }

    .job { background: #3498db; }
    .scholarship { background: #2ecc71; }
    .hustle { background: #f39c12; }
    .urgent { background: #e74c3c; }

    .btn {
      margin-top: 10px;
      padding: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .save {
      background: #555;
      color: white;
    }

    .aiBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #000;
      color: white;
      padding: 15px;
      border-radius: 50%;
      font-size: 18px;
    }

  </style>
</head>

<body>

<div class="header">🌟 OPPORTUNE</div>

<div class="search">
  <input id="search" placeholder="Search opportunities..." onkeyup="search()">
</div>

<div class="feed" id="feed"></div>

<div class="aiBtn" onclick="aiHelp()">🤖</div>

<script>
const data = [
  {type:"job", title:"Part-time Online Job", desc:"Work from home and earn daily income."},
  {type:"scholarship", title:"Uganda University Scholarship", desc:"Full tuition support available."},
  {type:"hustle", title:"Phone Accessories Business", desc:"Start small and grow income."},
  {type:"urgent", title:"Urgent Internship Closing Soon", desc:"Apply within 48 hours."}
];

function render(list){
  let html = "";
  list.forEach(item=>{
    html += `
      <div class="card">
        <div class="tag ${item.type}">${item.type.toUpperCase()}</div>
        <h3>${item.title}</h3>
        <p>${item.desc}</p>
        <button class="btn save" onclick="saveItem('${item.title}')">Save</button>
      </div>
    `;
  });
  document.getElementById("feed").innerHTML = html;
}

function search(){
  let val = document.getElementById("search").value.toLowerCase();
  let filtered = data.filter(d =>
    d.title.toLowerCase().includes(val) ||
    d.desc.toLowerCase().includes(val)
  );
  render(filtered);
}

function aiHelp(){
  alert("🤖 AI Suggestion:\nStart with small hustles like phone accessories or online freelancing while applying for scholarships.");
}

function saveItem(title){
  let saved = JSON.parse(localStorage.getItem("saved") || "[]");
  saved.push(title);
  localStorage.setItem("saved", JSON.stringify(saved));
  alert("Saved!");
}

render(data);
</script>

</body>
</html>
