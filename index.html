}

</head>

<body>

<div id="content"></div>

function showHome(){

  document.getElementById("content").innerHTML = `

    <p>Let’s improve your life today</p>
    <p>🏆 Points: ${points}</p>
  </div>

  <div class="section">

  </div>

    <h3>📈 Trending</h3>
    ${data.slice(0,3).map(i=>`<div class="card" onclick="showDetail('${i.title}')">${i.title}</div>`).join("")}

  <div class="section">
    <h3>🌍 Explore</h3>
    <div class="card" onclick="openList()">All Opportunities</div>
    <div class="card" onclick="showSaved()">⭐ Saved</div>
  </div>

  `;
}

// LIST
function openList(){
  document.getElementById("backBtn").style.display="block";
  currentList = data;
  display(data);
}

// DISPLAY
function display(list){
  document.getElementById("content").innerHTML = list.map(i=>`
    <div class="card" onclick="showDetail('${i.title}')">${i.title}</div>
  `).join("");
}

// DETAIL
function showDetail(title){
  let item = data.find(i=>i.title===title);

  points++;
  localStorage.setItem("points", points);

  document.getElementById("content").innerHTML = `
    <div class="section">
      <h2>${item.title}</h2>
      <p>${item.desc}</p>
      <div class="btn" onclick="saveItem('${item.title}')">⭐ Save</div>
      <div class="btn">${item.action}</div>
    </div>
  `;
}
