<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportune</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

/* SPLASH */
#splash {
  position:fixed;
  width:100%;
  height:100%;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:35px;
  z-index:9999;
}

/* APP */
#app {
  display:none;
  padding:10px;
}

.section {
  margin:10px 0;
  padding:10px;
  background:#1e293b;
  border-radius:10px;
}

.card {
  background:#334155;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
}

</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">🚀 Opportune</div>

<!-- APP -->
<div id="app">

<h2>Welcome to Opportune 🚀</h2>

<div class="section">
<h3>⚡ Urgent Opportunities</h3>
<div class="card">Sell Snacks Fast</div>
</div>

<div class="section">
<h3>💰 High Paying</h3>
<div class="card">Freelancing Online</div>
</div>

<div class="section">
<h3>🎓 Scholarships</h3>
<div class="card">Scholarship Canada</div>
</div>

</div>

<script>

// THIS WILL ALWAYS RUN
setTimeout(function(){
  var splash = document.getElementById("splash");
  var app = document.getElementById("app");

  if(splash) splash.style.display = "none";
  if(app) app.style.display = "block";

}, 3000);

</script>

</body>
</html>
