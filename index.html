<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportune</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

h1 { text-align:center; padding:10px; }

.section { margin:10px; padding:12px; background:#1e293b; border-radius:12px; }
.card { background:#334155; padding:12px; margin:8px 0; border-radius:10px; cursor:pointer; }

#search { width:90%; margin:10px; padding:10px; border-radius:8px; border:none; }

#backBtn {
  display:none;
  margin:10px;
  padding:10px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:8px;
}

.tag { font-size:11px; padding:3px 6px; border-radius:6px; margin-left:5px; }
.urgent { background:red; }
.high { background:green; }
.scholar { background:purple; }

.level, .daily { text-align:center; margin:10px; }
.daily { background:#2563eb; padding:10px; border-radius:10px; }
</style>
</head>

<body>

<h1>🚀 Opportune</h1>

<div class="level" id="levelDisplay"></div>

<input id="search" placeholder="Search opportunities..." onkeyup="searchOpportunities()">

<button id="backBtn" onclick="showHome()">⬅ Back</button>

<div class="daily" id="dailySuggestion"></div>

<div id="content"></div>

<script>

// STORAGE
let saved = JSON.parse(localStorage.getItem("saved") || "[]");
let level = parseInt(localStorage.getItem("level") || "1");

// DATA
const opportunities = [
{title:"Sell Snacks Fast",problem:"money",desc:"Sell snacks at school.",cost:"10k UGX",steps:"Buy and sell quickly.",tip:"Busy areas.",tag:"urgent"},
{title:"Freelancing Online",problem:"online",desc:"Earn online using skills.",cost:"Free",steps:"Join Fiverr.",tip:"Start small.",tag:"high"},
{title:"Scholarship Canada",problem:"study",desc:"Study abroad free.",cost:"Free",steps:"Apply online.",tip:"Check deadlines.",tag:"scholar urgent"},
{title:"YouTube Channel",problem:"online",desc:"Earn from videos.",cost:"Free",steps:"Upload videos.",tip:"Be consistent.",tag:"high"},
{title:"Laundry Service",problem:"money",desc:"Wash clothes for money.",cost:"0",steps:"Charge per cloth.",tip:"Target busy people.",tag:""},
{title:"Graphic Design",problem:"skill",desc:"Design logos.",cost:"Free",steps:"Learn Canva.",tip:"Practice daily.",tag:"high"}
];

// LEVEL
function updateLevel(){
document.getElementById("levelDisplay").innerText = "Level " + level;
localStorage.setItem("level", level);
}

// DAILY
function showDaily(){
let d = opportunities[Math.floor(Math.random()*opportunities.length)];
document.getElementById("dailySuggestion").innerText = "📌 Daily: " + d.title;
}

// HOME
function showHome(){
document.getElementById("backBtn").style.display="none";

document.getElementById("content").innerHTML = `
<div class="section">
<h3>⚡ Urgent Opportunities</h3>
${opportunities.filter(x=>x.tag.includes("urgent")).map(card).join("")}
</div>

<div class="section">
<h3>💰 High Paying</h3>
${opportunities.filter(x=>x.tag.includes("high")).map(card).join("")}
</div>

<div class="section">
<h3>🎓 Scholarships</h3>
${opportunities.filter(x=>x.tag.includes("scholar")).map(card).join("")}
</div>

<div class="section">
<h3>🌍 Categories</h3>
<div class="card" onclick="filter('money')">💰 Money</div>
<div class="card" onclick="filter('study')">🎓 Study</div>
<div class="card" onclick="filter('skill')">🧠 Skills</div>
<div class="card" onclick="filter('online')">🌐 Online</div>
<div class="card" onclick="showSaved()">⭐ Saved</div>
</div>
`;
}

// CARD
function card(x){
let tags="";
if(x.tag.includes("urgent")) tags += "<span class='tag urgent'>URGENT</span>";
if(x.tag.includes("high")) tags += "<span class='tag high'>HIGH</span>";
if(x.tag.includes("scholar")) tags += "<span class='tag scholar'>SCHOLAR</span>";

return `<div class="card" onclick="showDetail('${x.title}')">${x.title} ${tags}</div>`;
}

// FILTER
function filter(type){
document.getElementById("backBtn").style.display="block";
let list = opportunities.filter(x=>x.problem==type);
showList(list);
}

// LIST
function showList(list){
let html="";
list.forEach(x=> html += card(x));
document.getElementById("content").innerHTML = html || "No results";
}

// DETAIL
function showDetail(title){
let x = opportunities.find(i=>i.title==title) || saved.find(i=>i.title==title);

document.getElementById("backBtn").style.display="block";

document.getElementById("content").innerHTML = `
<div class="section">
<h2>${x.title}</h2>
<p>${x.desc}</p>
<p><b>💰 Cost:</b> ${x.cost}</p>
<p><b>📌 Steps:</b> ${x.steps}</p>
<p><b>💡 Tip:</b> ${x.tip}</p>
<div class="card" onclick="save('${x.title}')">⭐ Save</div>
</div>
`;
}

// SAVE
function save(title){
let x = opportunities.find(i=>i.title==title);

if(!saved.find(i=>i.title==title)){
saved.push(x);
localStorage.setItem("saved", JSON.stringify(saved));
level++;
updateLevel();
alert("Saved!");
}else{
alert("Already saved");
}
}

// SAVED
function showSaved(){
document.getElementById("backBtn").style.display="block";
showList(saved);
}

// SEARCH
function searchOpportunities(){
let v = document.getElementById("search").value.toLowerCase();
let list = opportunities.filter(x=>x.title.toLowerCase().includes(v));
showList(list);
}

// START
updateLevel();
showDaily();
showHome();

</script>

</body>
</html>
