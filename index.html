<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportune Live</title>

<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white;}
header{padding:15px;text-align:center;background:#111827;font-size:20px;font-weight:bold;}
.card{background:#1e293b;margin:10px;padding:10px;border-radius:10px;}
button{padding:6px;border:none;border-radius:6px;background:#22c55e;}
.small{font-size:12px;opacity:0.8;}
.tabs{display:flex;justify-content:space-around;background:#1f2937;padding:10px;}
.tab{cursor:pointer;}
.active{color:#22c55e;font-weight:bold;}
input{width:90%;padding:10px;margin:10px;border-radius:10px;border:none;}
</style>
</head>

<body>

<header>Opportune LIVE 🌍</header>

<div class="tabs">
<div class="tab active" onclick="loadJobs()">Jobs</div>
<div class="tab" onclick="loadScholarships()">Scholarships</div>
<div class="tab" onclick="loadHustles()">Hustles</div>
</div>

<input id="search" placeholder="Search..." onkeyup="filter()">

<div id="content"></div>

<script>

let currentData=[];

// 🌍 LIVE JOBS (REMOTE API)
async function loadJobs(){
document.getElementById("content").innerHTML="Loading jobs...";

let res=await fetch("https://remotive.com/api/remote-jobs");
let data=await res.json();

currentData=data.jobs.slice(0,20).map(j=>({
title:j.title,
desc:j.company_name + " - " + j.category
}));

render();
}

// 🎓 SCHOLARSHIPS (SIMULATED LIVE FEED)
function loadScholarships(){
currentData=[
{title:"Google Africa Scholarship",desc:"Learn tech skills"},
{title:"UN Youth Program",desc:"Global leadership program"},
{title:"Commonwealth Scholarship",desc:"Study abroad fully funded"}
];
render();
}

// 💡 HUSTLES (UPDATED IDEAS)
function loadHustles(){
currentData=[
{title:"TikTok Content Monetization",desc:"Earn from videos"},
{title:"Phone Accessories Business",desc:"Sell in your area"},
{title:"Freelance Writing",desc:"Write articles online"}
];
render();
}

// 🔍 SEARCH
function filter(){
let q=document.getElementById("search").value.toLowerCase();
let filtered=currentData.filter(i=>
i.title.toLowerCase().includes(q) ||
i.desc.toLowerCase().includes(q)
);
render(filtered);
}

// 📄 RENDER
function render(data=currentData){
let c=document.getElementById("content");
c.innerHTML="";

data.forEach(i=>{
c.innerHTML+=`
<div class="card">
<b>${i.title}</b>
<p class="small">${i.desc}</p>
</div>
`;
});
}

// default load
loadJobs();

</script>

</body>
</html>
