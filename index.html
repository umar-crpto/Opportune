<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportune</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

h1 { text-align:center; padding:10px; }

.section { margin:10px; padding:12px; background:#1e293b; border-radius:12px; }
.card { background:#334155; padding:12px; margin:8px 0; border-radius:10px; cursor:pointer; }

button {
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
}

.primary { background:#22c55e; color:black; }
.save { background:#3b82f6; color:white; }

#search { width:90%; margin:10px; padding:10px; border-radius:8px; border:none; }

#backBtn {
  display:none;
  margin:10px;
  padding:10px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:8px;
}

.topBox {
  margin:10px;
  padding:15px;
  background:#16a34a;
  border-radius:12px;
  text-align:center;
}

.level { text-align:center; margin:10px; }

</style>
</head>

<body>

<h1>🚀 Opportune</h1>

<div class="level" id="levelDisplay"></div>

<div class="topBox" id="todayBox"></div>

<input id="search" placeholder="Search opportunities..." onkeyup="searchOpportunities()">

<button id="backBtn" onclick="showHome()">⬅ Back</button>

<div id="content"></div>

<script>

// STORAGE
let saved = JSON.parse(localStorage.getItem("saved") || "[]");
let level = parseInt(localStorage.getItem("level") || "1");

// DATA (REAL ACTION-BASED)
const opportunities = [

{
title:"Sell Snacks Today",
earn:"20k–50k UGX/day",
time:"2–3 hours",
problem:"money",
steps:[
"Buy snacks (10k)",
"Go to busy place",
"Sell fast"
]
},

{
title:"Make Money Online (Phone)",
earn:"10k–100k UGX",
time:"1–2 hours",
problem:"online",
steps:[
"Use phone",
"Join freelancing sites",
"Do simple tasks"
]
},

{
title:"Scholarship Application",
earn:"School fees covered",
time:"1 hour",
problem:"study",
steps:[
"Search scholarships",
"Fill application",
"Submit early"
]
},

{
title:"Laundry Side Hustle",
earn:"5k–20k UGX",
time:"2 hours",
problem:"money",
steps:[
"Ask neighbors",
"Charge per cloth",
"Deliver clean clothes"
]
},

{
title:"Graphic Design",
earn:"20k–200k UGX",
time:"Flexible",
problem:"skill",
steps:[
"Learn Canva",
"Practice designs",
"Sell to clients"
]
}

];

// LEVEL
function updateLevel(){
document.getElementById("levelDisplay").innerText = "Level " + level;
localStorage.setItem("level", level);
}

// TODAY
function showToday(){
let o = opportunities[Math.floor(Math.random()*opportunities.length)];
document.getElementById("todayBox").innerHTML =
`🔥 TODAY: ${o.title}<br>💰 ${o.earn}<br><button class="primary" onclick="showDetail('${o.title}')">Start Now</button>`;
}

// HOME
function showHome(){
document.getElementById("backBtn").style.display="none";

document.getElementById("content").innerHTML = `

<div class="section">
<h3>⚡ Quick Actions</h3>
<div class="card" onclick="filter('money')">💰 I need money</div>
<div class="card" onclick="filter('study')">🎓 I need school fees</div>
<div class="card" onclick="filter('online')">🌐 I want online work</div>
<div class="card" onclick="filter('skill')">🧠 Learn a skill</div>
<div class="card" onclick="showSaved()">⭐ Saved</div>
</div>

<div class="section">
<h3>🔥 All Opportunities</h3>
${opportunities.map(card).join("")}
</div>

`;
}

// CARD
function card(o){
return `<div class="card" onclick="showDetail('${o.title}')">
${o.title}<br><small>💰 ${o.earn}</small>
</div>`;
}

// FILTER
function filter(type){
document.getElementById("backBtn").style.display="block";
let list = opportunities.filter(x=>x.problem==type);
showList(list);
}

// LIST
function showList(list){
let html="";
list.forEach(o=> html += card(o));
document.getElementById("content").innerHTML = html || "No results";
}

// DETAIL
function showDetail(title){
let o = opportunities.find(x=>x.title==title) || saved.find(x=>x.title==title);

document.getElementById("backBtn").style.display="block";

document.getElementById("content").innerHTML = `
<div class="section">
<h2>${o.title}</h2>
<p>💰 Earn: ${o.earn}</p>
<p>⏱ Time: ${o.time}</p>

<h3>Steps:</h3>
<ul>${o.steps.map(s=>"<li>"+s+"</li>").join("")}</ul>

<button class="primary">🚀 Start Now</button>
<button class="save" onclick="save('${o.title}')">⭐ Save</button>
</div>
`;
}

// SAVE
function save(title){
let o = opportunities.find(x=>x.title==title);

if(!saved.find(x=>x.title==title)){
saved.push(o);
localStorage.setItem("saved", JSON.stringify(saved));
level++;
updateLevel();
alert("Saved!");
}else{
alert("Already saved");
}
}

// SAVED
function showSaved(){
document.getElementById("backBtn").style.display="block";
showList(saved);
}

// SEARCH
function searchOpportunities(){
let v = document.getElementById("search").value.toLowerCase();
let list = opportunities.filter(o=>o.title.toLowerCase().includes(v));
showList(list);
}

// START
updateLevel();
showToday();
showHome();

</script>

</body>
</html>
