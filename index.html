<!DOCTYPE html>
<html>
<head>
<title>Opportune</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

h1{
  text-align:center;
  padding:10px;
}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px;
  border-radius:10px;
  cursor:pointer;
}

#search{
  width:90%;
  margin:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}

#backBtn{
  display:none;
  margin:10px;
  padding:10px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>🚀 Opportune</h1>

<input id="search" placeholder="Search..." onkeyup="search()">

<button id="backBtn" onclick="goHome()">⬅ Back</button>

<div id="content">Loading...</div>

<script>

// SAFE DATA
var data = [
"Sell snacks",
"Freelance writing",
"Laundry business",
"Graphic design",
"Scholarships abroad"
];

var currentList = [];
var saved = [];

// HOME
function showHome(){
  document.getElementById("backBtn").style.display="none";

  var html = "";
  html += "<div class='card' onclick='openList()'>🌍 Opportunities</div>";
  html += "<div class='card' onclick='showSaved()'>⭐ Saved</div>";

  document.getElementById("content").innerHTML = html;
}

// OPEN LIST
function openList(){
  document.getElementById("backBtn").style.display="block";
  currentList = data;
  display(data);
}

// DISPLAY
function display(list){
  var html = "";

  if(list.length === 0){
    html = "<div class='card'>No results</div>";
  } else {
    for(var i=0;i<list.length;i++){
      html += "<div class='card'>"+list[i]+"</div>";
    }
  }

  document.getElementById("content").innerHTML = html;
}

// SEARCH
function search(){
  var input = document.getElementById("search").value.toLowerCase();

  var results = [];

  for(var i=0;i<data.length;i++){
    if(data[i].toLowerCase().includes(input)){
      results.push(data[i]);
    }
  }

  display(results);
}

// SAVED
function showSaved(){
  document.getElementById("backBtn").style.display="block";

  if(saved.length === 0){
    document.getElementById("content").innerHTML = "<div class='card'>No saved items</div>";
  } else {
    display(saved);
  }
}

// BACK
function goHome(){
  showHome();
}

// START
showHome();

</script>

</body>
</html>
