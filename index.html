<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportune</title>

<style>
body{
font-family: Arial;
margin:0;
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.search{
padding:10px;
text-align:center;
}

input{
width:90%;
padding:10px;
border-radius:10px;
border:none;
outline:none;
}

.tabs{
display:flex;
justify-content:space-around;
background:#1f2937;
padding:10px;
}

.tab{
cursor:pointer;
padding:8px;
font-size:14px;
}

.active{
color:#22c55e;
font-weight:bold;
}

.card{
background:#1e293b;
margin:10px;
padding:10px;
border-radius:10px;
}

button{
padding:5px 10px;
margin-top:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.save{
background:#22c55e;
color:black;
}

.small{
font-size:12px;
opacity:0.8;
}

.hidden{display:none;}
</style>
</head>

<body>

<header>Opportune</header>

<div class="search">
<input id="search" placeholder="Search jobs, scholarships, hustles..." onkeyup="render()">
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('jobs')">Jobs</div>
<div class="tab" onclick="switchTab('scholarships')">Scholarships</div>
<div class="tab" onclick="switchTab('hustles')">Hustles</div>
<div class="tab" onclick="switchTab('business')">Business</div>
<div class="tab" onclick="switchTab('saved')">Saved</div>
</div>

<div id="content"></div>

<script>

let tab="jobs";

let data={
jobs:[
{title:"Shop Assistant Job",desc:"Kampala supermarket hiring staff",type:"job"},
{title:"Remote Data Entry",desc:"Work online from home",type:"job"},
{title:"Internship at Tech Company",desc:"Learn software development",type:"job"}
],

scholarships:[
{title:"Uganda University Scholarship",desc:"Full tuition support",type:"scholarship"},
{title:"African Leaders Program",desc:"Study abroad opportunity",type:"scholarship"}
],

hustles:[
{title:"Phone Repair Business",desc:"Start with small capital",type:"hustle"},
{title:"TikTok Content Creation",desc:"Earn from brand deals",type:"hustle"}
],

business:[
{title:"Mini Food Delivery",desc:"Start local food delivery service",type:"business"},
{title:"Clothes Reselling",desc:"Buy and resell fashion items",type:"business"}
]
};

let saved=JSON.parse(localStorage.getItem("saved"))||[];

function switchTab(t){
tab=t;
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
event.target.classList.add("active");
render();
}

function saveItem(item){
saved.push(item);
localStorage.setItem("saved",JSON.stringify(saved));
alert("Saved!");
}

function matchSearch(item,query){
return item.title.toLowerCase().includes(query)||item.desc.toLowerCase().includes(query);
}

function render(){

let q=document.getElementById("search").value.toLowerCase();
let container=document.getElementById("content");
container.innerHTML="";

let list=[];

if(tab=="jobs") list=data.jobs;
if(tab=="scholarships") list=data.scholarships;
if(tab=="hustles") list=data.hustles;
if(tab=="business") list=data.business;
if(tab=="saved") list=saved;

if(list.length==0){
container.innerHTML="<p style='text-align:center'>No data yet</p>";
return;
}

list.filter(i=>matchSearch(i,q)).forEach(i=>{
container.innerHTML+=`
<div class="card">
<b>${i.title}</b>
<p class="small">${i.desc}</p>
<button class="save" onclick='saveItem(${JSON.stringify(i)})'>Save</button>
</div>
`;
});
}

render();

</script>

</body>
</html>
