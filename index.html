<!DOCTYPE html>
<html>
<head>
<title>Opportune</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* Header */
h1 {
  text-align:center;
  padding:15px;
}

/* Cards */
.card {
  background:#1e293b;
  padding:15px;
  margin:10px;
  border-radius:10px;
  cursor:pointer;
}

/* Back button */
#backBtn {
  display:none;
  margin:10px;
  padding:10px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<h1>🚀 Opportune</h1>

<button id="backBtn" onclick="goHome()">⬅ Back</button>

<div id="content"></div>

<script>

// HOME LOAD
function showHome(){
  document.getElementById("backBtn").style.display = "none";

  document.getElementById("content").innerHTML = `
    <div class="card" onclick="showJobs()">💼 Jobs</div>
    <div class="card" onclick="showHustles()">💰 Side Hustles</div>
    <div class="card" onclick="showScholarships()">🎓 Scholarships</div>
    <div class="card" onclick="showBusiness()">🚀 Business Ideas</div>
  `;
}

// BACK
function goHome(){
  showHome();
}

// JOBS
function showJobs(){
  document.getElementById("backBtn").style.display = "block";

  document.getElementById("content").innerHTML = `
    <div class="card">Shop assistant job</div>
    <div class="card">Online typing job</div>
    <div class="card">Delivery helper</div>
    <div class="card">Freelance writing</div>
  `;
}

// HUSTLES
function showHustles(){
  document.getElementById("backBtn").style.display = "block";

  document.getElementById("content").innerHTML = `
    <div class="card">Sell snacks</div>
    <div class="card">Phone charging business</div>
    <div class="card">Poster design</div>
    <div class="card">Resell clothes</div>
  `;
}

// SCHOLARSHIPS
function showScholarships(){
  document.getElementById("backBtn").style.display = "block";

  document.getElementById("content").innerHTML = `
    <div class="card">Government scholarships</div>
    <div class="card">Free online courses</div>
    <div class="card">Study abroad programs</div>
    <div class="card">NGO support</div>
  `;
}

// BUSINESS
function showBusiness(){
  document.getElementById("backBtn").style.display = "block";

  document.getElementById("content").innerHTML = `
    <div class="card">Food business</div>
    <div class="card">Laundry service</div>
    <div class="card">Mobile money agent</div>
    <div class="card">Printing business</div>
  `;
}

// RUN APP
showHome();

</script>

</body>
</html>
