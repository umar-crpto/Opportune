<!DOCTYPE html>
<html>
<head>
  <title>Opportune</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f8;
    }

    .header {
      background: #1e90ff;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .search {
      padding: 15px;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 10px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    .jobs { background: #3498db; color: white; }
    .scholarships { background: #2ecc71; color: white; }
    .hustles { background: #f39c12; color: white; }
    .urgent { background: #e74c3c; color: white; }

    .box {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
      min-height: 200px;
    }
  </style>
</head>

<body>

<div class="header">🌟 OPPORTUNE</div>

<div class="search">
  <input id="searchInput" placeholder="Search jobs, scholarships, hustles..." onkeyup="search()">
</div>

<div class="buttons">
  <button class="jobs" onclick="show('jobs')">💼 Jobs</button>
  <button class="scholarships" onclick="show('scholarships')">🎓 Scholarships</button>
  <button class="hustles" onclick="show('hustles')">💡 Side Hustles</button>
  <button class="urgent" onclick="show('urgent')">🔥 Urgent</button>
</div>

<div class="box" id="content">
  <h2>Welcome to Opportune 🚀</h2>
  <p>Find jobs, scholarships, and money opportunities in one place.</p>
</div>

<script>
const data = {
  jobs: `
    <h2>💼 Jobs</h2>
    <p>- Part-time jobs in Uganda</p>
    <p>- Online freelance work</p>
    <p>- Internships for students</p>
  `,

  scholarships: `
    <h2>🎓 Scholarships</h2>
    <p>- Uganda university bursaries</p>
    <p>- African scholarships</p>
    <p>- International funding programs</p>
  `,

  hustles: `
    <h2>💡 Side Hustles</h2>
    <p>- Phone accessories business</p>
    <p>- Graphic design basics</p>
    <p>- Social media management</p>
  `,

  urgent: `
    <h2>🔥 Urgent Opportunities</h2>
    <p>- Apply in 48 hours jobs</p>
    <p>- Limited scholarships</p>
    <p>- Fast hiring programs</p>
  `
};

function show(type){
  document.getElementById("content").innerHTML = data[type];
}

function search(){
  let input = document.getElementById("searchInput").value.toLowerCase();
  document.getElementById("content").innerHTML = `
    <h3>🔍 Search Results</h3>
    <p>You searched for: <b>${input}</b></p>
    <p>Matching opportunities will appear here (next upgrade = real database)</p>
  `;
}
</script>

</body>
</html>
