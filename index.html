<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportune</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
header{padding:15px;text-align:center;background:#111827;font-size:22px;font-weight:bold;}
.tabs{display:flex;flex-wrap:wrap;justify-content:space-around;background:#1f2937;padding:10px;}
.tab{cursor:pointer;font-size:12px;}
.active{color:#22c55e;font-weight:bold;}
input{width:90%;padding:10px;margin:10px;border-radius:10px;border:none;}
.card{background:#1e293b;margin:10px;padding:10px;border-radius:10px;}
button{padding:6px;border:none;border-radius:6px;background:#22c55e;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000cc;display:none;justify-content:center;align-items:center;}
.modal-content{background:#1e293b;padding:15px;border-radius:10px;width:90%;}
</style>
</head>

<body>

<header>Opportune 🌍</header>

<div class="tabs">
<div class="tab active" onclick="switchTab('jobs')">Jobs</div>
<div class="tab" onclick="switchTab('business')">Business</div>
<div class="tab" onclick="switchTab('hustles')">Hustles</div>
<div class="tab" onclick="switchTab('scholarships')">Scholarships</div>
<div class="tab" onclick="switchTab('saved')">Saved</div>
</div>

<input id="search" placeholder="Search..." onkeyup="render()">

<div id="content"></div>

<div class="modal" id="modal">
<div class="modal-content">
<h3 id="title"></h3>
<p id="desc"></p>
<p id="money"></p>
<p id="steps"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

let tab="jobs";

/* REAL DATA (NOT REPEATED) */

let data={

jobs:[
{t:"Software Developer",d:"Build apps and websites",cost:"$0-$200",earn:"$500-$5000/mo",steps:"Learn coding → Build projects → Apply jobs"},
{t:"Graphic Designer",d:"Design logos and posters",cost:"$50",earn:"$300-$2000/mo",steps:"Learn design → Use Canva → Get clients"},
{t:"Video Editor",d:"Edit videos for creators",cost:"$0",earn:"$200-$3000/mo",steps:"Learn editing → Practice → Freelance"},
{t:"Data Entry Clerk",d:"Input data online",cost:"$0",earn:"$100-$800/mo",steps:"Apply online → Work remote"},
{t:"Social Media Manager",d:"Manage pages",cost:"$0",earn:"$200-$1500/mo",steps:"Learn social media → Get clients"},
{t:"Web Developer",d:"Build websites",cost:"$0",earn:"$500-$5000/mo",steps:"Learn HTML → Build sites"},
{t:"IT Support",d:"Fix computers",cost:"$50",earn:"$200-$1000/mo",steps:"Learn basics → Help people"},
{t:"Online Tutor",d:"Teach students",cost:"$0",earn:"$200-$2000/mo",steps:"Choose subject → Teach online"},
{t:"Photographer",d:"Take event photos",cost:"$100",earn:"$300-$2000/mo",steps:"Get camera → Start small"},
{t:"App Tester",d:"Test apps",cost:"$0",earn:"$100-$1000/mo",steps:"Join platforms → Test apps"}
],

business:[
{t:"Restaurant",d:"Sell food",cost:"$500",earn:"$500-$5000/mo",steps:"Find location → Cook → Sell"},
{t:"Clothing Shop",d:"Sell clothes",cost:"$300",earn:"$300-$3000/mo",steps:"Buy stock → Sell"},
{t:"Car Wash",d:"Clean cars",cost:"$200",earn:"$200-$1500/mo",steps:"Start small → Grow"},
{t:"Salon",d:"Hair and beauty",cost:"$400",earn:"$400-$3000/mo",steps:"Learn → Open shop"},
{t:"Phone Shop",d:"Sell phones",cost:"$500",earn:"$500-$4000/mo",steps:"Buy → Sell"},
{t:"Bakery",d:"Make bread",cost:"$300",earn:"$300-$2500/mo",steps:"Bake → Sell"},
{t:"Delivery Service",d:"Deliver goods",cost:"$200",earn:"$200-$2000/mo",steps:"Use bike → Deliver"},
{t:"Cyber Cafe",d:"Internet services",cost:"$600",earn:"$400-$3000/mo",steps:"Setup → Charge users"},
{t:"Laundry",d:"Wash clothes",cost:"$200",earn:"$200-$1500/mo",steps:"Start → Serve clients"},
{t:"Farm Business",d:"Grow crops",cost:"$300",earn:"$300-$3000/mo",steps:"Plant → Sell"}
],

hustles:[
{t:"Freelancing",d:"Work online",cost:"$0",earn:"$200-$3000/mo",steps:"Create account → Work"},
{t:"YouTube",d:"Create videos",cost:"$0",earn:"$100-$5000/mo",steps:"Post videos → Grow"},
{t:"TikTok Creator",d:"Make content",cost:"$0",earn:"$100-$3000/mo",steps:"Post daily"},
{t:"Dropshipping",d:"Sell online",cost:"$50",earn:"$200-$5000/mo",steps:"Find product → Sell"},
{t:"Graphic Design",d:"Design work",cost:"$0",earn:"$200-$2000/mo",steps:"Learn → Sell"},
{t:"Photography",d:"Take photos",cost:"$100",earn:"$300-$2000/mo",steps:"Shoot → Sell"},
{t:"Phone Repair",d:"Fix phones",cost:"$50",earn:"$200-$1500/mo",steps:"Learn → Fix"},
{t:"Reselling",d:"Buy and sell",cost:"$100",earn:"$200-$2000/mo",steps:"Buy cheap → Sell"},

{t:"Blogging",d:"Write online",cost:"$0",earn:"$100-$2000/mo",steps:"Write → Monetize"}
],

scholarships:[
{t:"Chevening Scholarship",d:"Study in UK",cost:"Free",earn:"Full funding",steps:"Apply → Get selected"},
{t:"DAAD Scholarship",d:"Study Germany",cost:"Free",earn:"Full funding",steps:"Apply online"},
{t:"MEXT Japan",d:"Study Japan",cost:"Free",earn:"Full funding",steps:"Apply embassy"},
{t:"Fulbright USA",d:"Study USA",cost:"Free",earn:"Full funding",steps:"Apply"},
{t:"Erasmus+",d:"Study Europe",cost:"Free",earn:"Full funding",steps:"Apply"},
{t:"Mastercard Foundation",d:"Africa students",cost:"Free",earn:"Full funding",steps:"Apply"},
{t:"Commonwealth",d:"UK study",cost:"Free",earn:"Full funding",steps:"Apply"},
{t:"Google Scholarship",d:"Tech skills",cost:"Free",earn:"Free training",steps:"Apply"},
{t:"AU Scholarship",d:"Africa",cost:"Free",earn:"Funding",steps:"Apply"},
{t:"Korea Scholarship",d:"Study Korea",cost:"Free",earn:"Full funding",steps:"Apply"}
]

};

let saved=JSON.parse(localStorage.getItem("saved"))||[];

/* FUNCTIONS */

function switchTab(t){
tab=t;
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
event.target.classList.add("active");
render();
}

function saveItem(item){
if(!saved.find(s=>s.t===item.t)){
saved.push(item);
localStorage.setItem("saved",JSON.stringify(saved));
alert("Saved!");
}
}

function openModal(item){
document.getElementById("modal").style.display="flex";
title.innerText=item.t;
desc.innerText=item.d;
money.innerText="💰 Cost: "+item.cost+" | 📈 Earn: "+item.earn;
steps.innerText="🧠 "+item.steps;
}

function closeModal(){
modal.style.display="none";
}

function render(){
let q=search.value.toLowerCase();
let list=(tab=="saved")?saved:data[tab];

content.innerHTML="";

list.filter(i=>i.t.toLowerCase().includes(q)).forEach(i=>{
content.innerHTML+=`
<div class="card">
<b onclick='openModal(${JSON.stringify(i)})'>${i.t}</b>
<p>${i.d}</p>
<button onclick='saveItem(${JSON.stringify(i)})'>Save</button>
</div>
`;
});
}

render();

</script>

</body>
</html>
