<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportune</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

#splash {
  position:fixed;
  width:100%;
  height:100%;
  background:#0f172a;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:35px;
  z-index:9999;
}

h1 { text-align:center; }

.section { margin:10px; padding:10px; background:#1e293b; border-radius:10px; }
.card { background:#334155; padding:10px; margin:6px 0; border-radius:8px; cursor:pointer; }

.tag { font-size:10px; margin-left:5px; padding:3px 5px; border-radius:5px; }
.urgent { background:red; }
.high { background:green; }
.scholar { background:purple; }

#search { width:90%; margin:10px; padding:10px; border-radius:8px; border:none; }
#backBtn { display:none; margin:10px; padding:10px; background:#3b82f6; border:none; color:white; border-radius:8px; }

</style>
</head>

<body>

<div id="splash">🚀 Opportune</div>

<div id="app" style="display:none;">

<h1>🚀 Opportune</h1>

<input id="search" placeholder="Search..." onkeyup="searchOpportunities()">
<button id="backBtn" onclick="showHome()">⬅ Back</button>

<div id="content"></div>

</div>

<script>

// SAFE START (no crash)
window.onload = function(){

// hide splash safely
setTimeout(function(){
  document.getElementById("splash").style.display="none";
  document.getElementById("app").style.display="block";
},2000);

// DATA
const opportunities = [
{title:"Sell Snacks Fast",problem:"money",desc:"Sell snacks quickly",tag:"urgent"},
{title:"Freelancing Online",problem:"online",desc:"Earn online",tag:"high"},
{title:"Scholarship Canada",problem:"study",desc:"Study abroad",tag:"scholar urgent"},
{title:"YouTube Channel",problem:"online",desc:"Make videos",tag:"high"},
{title:"Laundry Service",problem:"money",desc:"Wash clothes",tag:""},
{title:"Graphic Design",problem:"skill",desc:"Design work",tag:"high"}
];

// HOME
function showHome(){
document.getElementById("backBtn").style.display="none";

let html = "<div class='section'><h3>⚡ Urgent</h3>";
html += opportunities.filter(x=>x.tag.includes("urgent")).map(card).join("");
html += "</div>";

html += "<div class='section'><h3>💰 High Paying</h3>";
html += opportunities.filter(x=>x.tag.includes("high")).map(card).join("");
html += "</div>";

html += "<div class='section'><h3>🎓 Scholarships</h3>";
html += opportunities.filter(x=>x.tag.includes("scholar")).map(card).join("");
html += "</div>";

html += "<div class='section'><h3>All</h3>";
html += opportunities.map(card).join("");
html += "</div>";

document.getElementById("content").innerHTML = html;
}

// CARD
function card(x){
let tags="";
if(x.tag.includes("urgent")) tags += "<span class='tag urgent'>URGENT</span>";
if(x.tag.includes("high")) tags += "<span class='tag high'>HIGH</span>";
if(x.tag.includes("scholar")) tags += "<span class='tag scholar'>SCHOLAR</span>";

return `<div class="card" onclick="showDetail('${x.title}')">${x.title} ${tags}</div>`;
}

// DETAIL
window.showDetail = function(title){
let x = opportunities.find(i=>i.title==title);
document.getElementById("backBtn").style.display="block";
document.getElementById("content").innerHTML = `
<div class="section">
<h2>${x.title}</h2>
<p>${x.desc}</p>
</div>`;
}

// SEARCH
window.searchOpportunities = function(){
let v = document.getElementById("search").value.toLowerCase();
let list = opportunities.filter(x=>x.title.toLowerCase().includes(v));
document.getElementById("content").innerHTML = list.map(card).join("");
}

// START
showHome();

};

</script>

</body>
</html>
