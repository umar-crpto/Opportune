<!DOCTYPE html>
<html>
<head>
<title>Opportune</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

h1{
  text-align:center;
  padding:10px;
}

.section{
  margin:10px;
  padding:10px;
  background:#1e293b;
  border-radius:10px;
}

.card{
  background:#334155;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  cursor:pointer;
}

.btn{
  background:#3b82f6;
  padding:10px;
  border:none;
  border-radius:8px;
  color:white;
  margin-top:10px;
  text-align:center;
}

#search{
  width:90%;
  margin:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}

#backBtn{
  display:none;
  margin:10px;
  padding:10px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>🚀 Opportune</h1>

<input id="search" placeholder="Search..." onkeyup="search()">

<button id="backBtn" onclick="goHome()">⬅ Back</button>

<div id="content"></div>

<script>

// SAFE LOAD
let saved = JSON.parse(localStorage.getItem("saved") || "[]");
let points = parseInt(localStorage.getItem("points") || "0");

let currentList = [];

// DATA
const data = [
{title:"Sell snacks",desc:"Start small snack business",action:"Start with 20k UGX"},
{title:"Freelance writing",desc:"Write articles online",action:"Use Fiverr or Upwork"},
{title:"Scholarship abroad",desc:"Study free overseas",action:"Search scholarships online"},
{title:"Laundry service",desc:"Wash clothes for money",action:"Start locally in your area"},
{title:"Graphic design",desc:"Design posters and logos",action:"Learn using Canva"}
];

// HOME
function showHome(){
  document.getElementById("backBtn").style.display="none";

  let daily = data[Math.floor(Math.random()*data.length)];

  let html = "";

  html += `
  <div class="section">
    <h3>👋 Welcome</h3>
    <p>Let’s improve your life today</p>
    <p>🏆 Points: ${points}</p>
  </div>
  `;

  html += `
  <div class="section">
    <h3>🔥 Daily Opportunity</h3>
    <div class="card" onclick="showDetail('${daily.title}')">${daily.title}</div>
  </div>
  `;

  html += `
  <div class="section">
    <h3>📈 Trending</h3>
  `;

  data.slice(0,3).forEach(i=>{
    html += `<div class="card" onclick="showDetail('${i.title}')">${i.title}</div>`;
  });

  html += `</div>`;

  html += `
  <div class="section">
    <h3>🌍 Explore</h3>
    <div class="card" onclick="openList()">All Opportunities</div>
    <div class="card" onclick="showSaved()">⭐ Saved</div>
  </div>
  `;

  document.getElementById("content").innerHTML = html;
}

// LIST
function openList(){
  document.getElementById("backBtn").style.display="block";
  currentList = data;
  display(data);
}

// DISPLAY
function display(list){
  if(list.length===0){
    document.getElementById("content").innerHTML="<div class='card'>No results</div>";
    return;
  }

  let html = "";
  list.forEach(i=>{
    html += `<div class="card" onclick="showDetail('${i.title}')">${i.title}</div>`;
  });

  document.getElementById("content").innerHTML = html;
}

// DETAIL
function showDetail(title){
  let item = data.find(i=>i.title===title);

  points++;
  localStorage.setItem("points", points);

  document.getElementById("content").innerHTML = `
    <div class="section">
      <h2>${item.title}</h2>
      <p>${item.desc}</p>
      <div class="btn" onclick="saveItem('${item.title}')">⭐ Save</div>
      <div class="btn">${item.action}</div>
    </div>
  `;
}

// SAVE
function saveItem(title){
  let item = data.find(i=>i.title===title);

  if(!saved.find(i=>i.title===title)){
    saved.push(item);
    localStorage.setItem("saved", JSON.stringify(saved));
    alert("Saved!");
  }
}

// SAVED
function showSaved(){
  document.getElementById("backBtn").style.display="block";

  if(saved.length===0){
    document.getElementById("content").innerHTML="<div class='card'>No saved items</div>";
  } else {
    display(saved);
  }
}

// SEARCH
function search(){
  let input = document.getElementById("search").value.toLowerCase();

  let results = data.filter(i =>
    i.title.toLowerCase().includes(input)
  );

  display(results);
}

// BACK
function goHome(){
  showHome();
}

// START
showHome();

</script>

</body>
</html>
