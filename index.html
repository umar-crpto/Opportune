<!DOCTYPE html>
<html>
<head>
<title>Opportune</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* Header */
h1{
  text-align:center;
  padding:10px;
}

/* Search */
#search{
  width:90%;
  margin:10px;
  padding:12px;
  border-radius:10px;
  border:none;
}

/* Cards */
.card{
  background:#1e293b;
  padding:15px;
  margin:10px;
  border-radius:12px;
  cursor:pointer;
}

/* Detail box */
#detail{
  padding:15px;
}

/* Buttons */
.btn{
  display:block;
  margin:10px;
  padding:12px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:8px;
  text-align:center;
}

/* Star */
.star{
  float:right;
}

/* Back */
#backBtn{
  display:none;
  margin:10px;
  padding:10px;
  background:#3b82f6;
  border:none;
  color:white;
  border-radius:8px;
}
</style>
</head>

<body>

<input id="search" placeholder="Search..." onkeyup="search()">

<button id="backBtn" onclick="goHome()">⬅ Back</button>

<div id="content"></div>

function display(list){
  if(list.length===0){
    document.getElementById("content").innerHTML="<div class='card'>No results</div>";
    return;
  }

  document.getElementById("content").innerHTML = list.map(item => `
