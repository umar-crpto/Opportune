<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportune</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;

<!-- OPPORTUNE MAIN FEATURES -->
<div id="opportuneApp" style="margin-top:20px; font-family: Arial;">

  <h2 style="text-align:center;">🌟 Opportune Hub</h2>

  <!-- NAV BUTTONS -->
  <div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin:15px 0;">
    <button onclick="showSection('jobs')">💼 Jobs</button>
    <button onclick="showSection('scholarships')">🎓 Scholarships</button>
    <button onclick="showSection('hustles')">💡 Side Hustles</button>
    <button onclick="showSection('urgent')">🔥 Urgent</button>
  </div>

  <!-- CONTENT AREA -->
  <div id="contentBox" style="padding:15px; border:1px solid #ccc; border-radius:10px; min-height:200px;">

    <h3>Welcome to Opportune 🚀</h3>
    <p>Select a category above to explore opportunities.</p>

  </div>

</div>
/* HEADER */
header {
    background:#1e293b;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* NAV */
nav {
    display:flex;
    justify-content:space-around;
    background:#111827;
    padding:10px;
    position:sticky;
    top:0;
}

nav button {
    background:none;
    border:none;
    color:white;
    font-size:14px;
}

/* SEARCH */
#search {
    width:90%;
    margin:10px;
    padding:10px;
    border-radius:8px;
    border:none;
}

/* CARDS */
.card {
    background:#1e293b;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

.card button {
    margin-top:5px;
    padding:5px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* SECTIONS */
.section { display:none; }
.active { display:block; }

.saveBtn { background:green; color:white; }
.featured { border:2px solid gold; }

</style>
</head>

<body>

<header>🚀 OPPORTUNE</header>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('featured')">Featured</button>
<button onclick="show('saved')">Saved</button>
<button onclick="show('profile')">Profile</button>
</nav>

<input type="text" id="search" placeholder="Search jobs, scholarships..." onkeyup="render()">

<!-- HOME -->
<div id="home" class="section active"></div>

<!-- FEATURED -->
<div id="featured" class="section"></div>

<!-- SAVED -->
<div id="saved" class="section"></div>

<!-- PROFILE -->
<div id="profile" class="section">
<h3>Your Stats 📊</h3>
<p id="stats"></p>
</div>

<script>

// ---------------- DATA ----------------
let opportunities = [
    {id:1, title:"Marketing Job Kampala", type:"Job", featured:true},
    {id:2, title:"University Scholarship 2026", type:"Scholarship", featured:true},
    {id:3, title:"Online Writing Side Hustle", type:"Hustle", featured:false},
    {id:4, title:"Internship at Tech Company", type:"Job", featured:false},
];

// ---------------- STORAGE ----------------
function getSaved(){
    return JSON.parse(localStorage.getItem("saved") || "[]");
}

function saveItem(id){
    let saved = getSaved();
    if(!saved.includes(id)){
        saved.push(id);
        localStorage.setItem("saved", JSON.stringify(saved));
    }
    render();
}

// ---------------- NAV ----------------
function show(section){
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(section).classList.add("active");
    render();
}

// ---------------- RENDER ----------------
function render(){
    let search = document.getElementById("search").value.toLowerCase();

    let home = document.getElementById("home");
    let featured = document.getElementById("featured");
    let saved = document.getElementById("saved");

    home.innerHTML = "";
    featured.innerHTML = "";
    saved.innerHTML = "";

    let savedList = getSaved();

    opportunities.forEach(op => {

        if(op.title.toLowerCase().includes(search)){

            let card = `
            <div class="card ${op.featured ? 'featured' : ''}">
                <h3>${op.title}</h3>
                <p>Type: ${op.type}</p>
                <button class="saveBtn" onclick="saveItem(${op.id})">Save</button>
            </div>
            `;

            home.innerHTML += card;

            if(op.featured){
                featured.innerHTML += card;
            }

            if(savedList.includes(op.id)){
                saved.innerHTML += card;
            }
        }
    });

    updateStats();
}

// ---------------- STATS ----------------
function updateStats(){
    let savedList = getSaved();
    document.getElementById("stats").innerHTML =
        "Saved Opportunities: " + savedList.length;
}

// ---------------- START ----------------
render();

</script>

</body>
</html>
