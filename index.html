<!DOCTYPE html>
<html>
<head>
<title>Opportune</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* Header */
h1 {
  text-align:center;
  padding:10px;
}

/* Search */
#search {
  width:90%;
  margin:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}

/* Cards */
.card {
  background:#1e293b;
  padding:15px;
  margin:10px;
  border-radius:10px;
  cursor:pointer;
  position:relative;
}

/* Star button */
.star {
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
}

/* Back button */
#backBtn {
  display:none;
  margin:10px;
  padding:10px;
  background:#3b82f6;
  color:white;
  border:none;
  border-radius:5px;
}
</style>
</head>

<body>

<h1>🚀 Opportune</h1>

<input id="search" placeholder="Search opportunities..." onkeyup="search()">

<button id="backBtn" onclick="goHome()">⬅ Back</button>

<div id="content"></div>

<script>

let currentList = [];
let saved = [];

// HOME
function showHome(){
  document.getElementById("backBtn").style.display = "none";
  document.getElementById("search").value = "";

  document.getElementById("content").innerHTML = `
    <div class="card" onclick="showJobs()">💼 Jobs</div>
    <div class="card" onclick="showHustles()">💰 Side Hustles</div>
    <div class="card" onclick="showScholarships()">🎓 Scholarships</div>
    <div class="card" onclick="showBusiness()">🚀 Business Ideas</div>
    <div class="card" onclick="showSaved()">⭐ Saved</div>
  `;
}

// DISPLAY LIST
function display(list){
  currentList = list;

  document.getElementById("content").innerHTML = list.map(item => `
    <div class="card">
      ${item}
      <span class="star" onclick="saveItem('${item}')">⭐</span>
    </div>
  `).join("");
}

// SAVE
function saveItem(item){
  if(!saved.includes(item)){
    saved.push(item);
    alert("Saved!");
  }
}

// SEARCH
function search(){
  let input = document.getElementById("search").value.toLowerCase();

  let filtered = currentList.filter(item =>
    item.toLowerCase().includes(input)
  );

  display(filtered);
}

// BACK
function goHome(){
  showHome();
}

// DATA
function showJobs(){
  document.getElementById("backBtn").style.display = "block";
  display([
    "Shop assistant job",
    "Online typing job",
    "Delivery helper",
    "Freelance writing"
  ]);
}

function showHustles(){
  document.getElementById("backBtn").style.display = "block";
  display([
    "Sell snacks",
    "Phone charging business",
    "Poster design",
    "Resell clothes"
  ]);
}

function showScholarships(){
  document.getElementById("backBtn").style.display = "block";
  display([
    "Government scholarships",
    "Free online courses",
    "Study abroad programs",
    "NGO education support"
  ]);
}

function showBusiness(){
  document.getElementById("backBtn").style.display = "block";
  display([
    "Food business",
    "Laundry service",
    "Mobile money agent",
    "Printing business"
  ]);
}

function showSaved(){
  document.getElementById("backBtn").style.display = "block";
  display(saved.length ? saved : ["No saved items"]);
}

// START
showHome();

</script>

</body>
</html>
